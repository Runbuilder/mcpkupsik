# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    properties:
      transport:
        type: string
        default: ws
        description: "Transport to use: 'ws' for WebSocket or 'stdio' for stdio
          communication"
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({
      command: 'npm',
      args: ['start'],
      env: { TRANSPORT: config.transport || 'ws' }
    })
  exampleConfig:
    transport: ws
